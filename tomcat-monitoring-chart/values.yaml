tomcat:
  replicaCount: 1
  image:
    repository: tomcat
    tag: "10.1-jdk17"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    metricsPort: 9404
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

ingress:
  enabled: true
  className: nginx
  host: tomcat.cutsopen.co.uk
  annotations: {}

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: latest
  service:
    port: 9090
  scrapeInterval: 15s

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: latest
  service:
    port: 3000
  adminUser: admin
  adminPassword: admin
  ingress:
    host: grafana.cutsopen.co.uk

loki:
  enabled: true
  image:
    repository: grafana/loki
    tag: latest
  service:
    port: 3100
  retentionPeriod: 744h

alloy:
  enabled: true
  image:
    repository: grafana/alloy
    tag: latest
