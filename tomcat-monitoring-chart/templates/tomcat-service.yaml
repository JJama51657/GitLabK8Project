apiVersion: v1
kind: Service
metadata:
  name: tomcat-service
  labels:
    app: tomcat
spec:
  selector:
    app: tomcat
  ports:
  - port: {{ .Values.tomcat.service.port }}
    targetPort: {{ .Values.tomcat.service.port }}
    name: http
  - port: {{ .Values.tomcat.service.metricsPort }}
    targetPort: {{ .Values.tomcat.service.metricsPort }}
    name: metrics
  type: {{ .Values.tomcat.service.type }}
