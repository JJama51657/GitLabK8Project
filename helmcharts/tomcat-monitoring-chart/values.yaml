opa:
  allowedRegistry: "123456789012.dkr.ecr.us-east-1.amazonaws.com"

tomcat:
  replicaCount: 1
  image:
    repository: tomcat
    tag: "10.1-jdk17"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    metricsPort: 9404
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    cpuThreshold: 70
ingress:
  enabled: true
  className: nginx
  host: dev.tomcat.kubevpro.cutsopen.co.uk
  annotations: {}

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: latest
  service:
    port: 9090
  scrapeInterval: 15s

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: latest
  service:
    port: 3000
  adminUser: admin
  adminPassword: admin
  ingress:
    host: dev.grafana.kubevpro.cutsopen.co.uk

loki:
  enabled: true
  image:
    repository: grafana/loki
    tag: latest
  service:
    port: 3100
  retentionPeriod: 24h

alloy:
  enabled: false
  image:
    repository: grafana/alloy
    tag: latest

aws:
  region: us-east-1

certManager:
  environment: staging          # use staging first — prod has a rate limit of 5 duplicate certs per week
  email: <your-email>           # Let's Encrypt sends expiry warnings here
  hostedZoneID: <your-zone-id>  # Route53 hosted zone ID cert-manager writes the DNS-01 challenge TXT record to
  acmeServer: https://acme-staging-v02.api.letsencrypt.org/directory
  # once staging works swap both values below for prod:
  # environment: prod
  # acmeServer: https://acme-v02.api.letsencrypt.org/directory
